<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Animations - TPMI</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        .section {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            color: white;
        }
        #s1 { background: #105d42; }
        #s2 { background: #ffd769; color: #333; }
        #s3 { background: #1e3a8a; }
        #s4 { background: #dc2626; }
        
        .box {
            width: 200px;
            height: 200px;
            background: white;
            margin: 20px;
            opacity: 0;
        }
        
        .scroll-progress {
            position: fixed;
            top: 0;
            left: 0;
            width: 0%;
            height: 3px;
            background: linear-gradient(90deg, #105d42, #ffd769);
            z-index: 9999;
        }
        
        .status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 20px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 1000;
        }
        
        .status div {
            margin: 5px 0;
        }
        
        .loaded { color: #10b981; }
        .not-loaded { color: #ef4444; }
    </style>
</head>
<body>
    
    <div class="scroll-progress"></div>
    
    <div class="status">
        <h3>Status de Librerías:</h3>
        <div id="jquery-status">jQuery: <span class="not-loaded">NO CARGADO</span></div>
        <div id="gsap-status">GSAP: <span class="not-loaded">NO CARGADO</span></div>
        <div id="scrolltrigger-status">ScrollTrigger: <span class="not-loaded">NO CARGADO</span></div>
    </div>
    
    <div class="section" id="s1">
        <div>
            <h1>Sección 1</h1>
            <div class="box animate-box"></div>
        </div>
    </div>
    
    <div class="section" id="s2">
        <div>
            <h1>Sección 2</h1>
            <div class="box animate-box"></div>
        </div>
    </div>
    
    <div class="section" id="s3">
        <div>
            <h1>Sección 3</h1>
            <div class="box animate-box"></div>
        </div>
    </div>
    
    <div class="section" id="s4">
        <div>
            <h1>Sección 4</h1>
            <div class="box animate-box"></div>
        </div>
    </div>

    <!-- Scripts en el orden correcto -->
    <script src="assets/js/jquery-3.6.0.min.js"></script>
    <script src="assets/js/gsap.min.js"></script>
    <script src="assets/js/ScrollTrigger.min.js"></script>
    
    <script>
        // Verificar que las librerías están cargadas
        jQuery(document).ready(function($) {
            
            // Actualizar status
            if (typeof jQuery !== 'undefined') {
                $('#jquery-status span').text('CARGADO ✓').removeClass('not-loaded').addClass('loaded');
            }
            
            if (typeof gsap !== 'undefined') {
                $('#gsap-status span').text('CARGADO ✓').removeClass('not-loaded').addClass('loaded');
            }
            
            if (typeof ScrollTrigger !== 'undefined') {
                $('#scrolltrigger-status span').text('CARGADO ✓').removeClass('not-loaded').addClass('loaded');
            }
            
            // Registrar ScrollTrigger
            if (typeof gsap !== 'undefined' && typeof ScrollTrigger !== 'undefined') {
                gsap.registerPlugin(ScrollTrigger);
                
                // Scroll Progress Bar
                window.addEventListener('scroll', function() {
                    const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
                    const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                    const scrolled = (winScroll / height) * 100;
                    document.querySelector('.scroll-progress').style.width = scrolled + "%";
                });
                
                // Animar cajas
                gsap.utils.toArray('.animate-box').forEach((box, index) => {
                    gsap.from(box, {
                        scrollTrigger: {
                            trigger: box,
                            start: "top 80%",
                            end: "bottom 20%",
                            toggleActions: "play none none reverse",
                            markers: true // Mostrar marcadores de debug
                        },
                        opacity: 0,
                        y: 100,
                        rotation: 360,
                        duration: 1,
                        ease: "back.out"
                    });
                });
                
                console.log('%c✅ Animaciones de prueba activadas!', 'color: #10b981; font-size: 16px; font-weight: bold;');
            } else {
                console.error('❌ GSAP o ScrollTrigger no están cargados');
            }
        });
    </script>
</body>
</html>
